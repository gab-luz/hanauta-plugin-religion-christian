<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Minimalist Bible Prayer Widget</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for UI, Playfair Display for Scripture -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;family=Playfair+Display:ital,wght@0,500;1,500&amp;display=swap" rel="stylesheet"/>
<style data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'glass-dark': 'rgba(23, 23, 35, 0.8)',
            'glass-border': 'rgba(255, 255, 255, 0.1)',
            'lavender-accent': '#C3B1E1',
            'deep-purple': '#1A1625',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          backdropBlur: {
            'xl': '20px',
          }
        }
      }
    }
  </style>
<style data-purpose="custom-glassmorphism">
    /* Custom glassmorphism styles not easily covered by Tailwind utility classes */
    .glass-panel {
      background: linear-gradient(135deg, rgba(30, 27, 46, 0.9) 0%, rgba(20, 20, 30, 0.95) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(195, 177, 225, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }
    
    .verse-container {
      background: rgba(195, 177, 225, 0.05);
      border: 1px solid rgba(195, 177, 225, 0.2);
    }

    .active-row {
      background: rgba(195, 177, 225, 0.1);
      border: 1px solid rgba(195, 177, 225, 0.3);
      border-radius: 12px;
    }

    /* Hyprland-style scrollbar (if needed) */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(195, 177, 225, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-[#0a0a0f] flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: Desktop Widget Container -->
<main class="glass-panel w-full max-w-[380px] rounded-[24px] overflow-hidden text-gray-200 font-sans p-6" data-purpose="widget-main-container">
<!-- BEGIN: Header Section -->
<header class="flex justify-between items-start mb-6" data-purpose="widget-header">
<div>
<h1 class="text-xl font-semibold text-white tracking-tight">15 March 2026</h1>
<p class="text-sm text-lavender-accent/70 font-medium">Lent Period • Week 4</p>
</div>
<button class="p-2 hover:bg-white/10 rounded-full transition-colors" title="Refresh">
<svg class="text-lavender-accent" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
</button>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Daily Verse Section -->
<section class="verse-container rounded-2xl p-5 mb-8 text-center" data-purpose="daily-verse">
<p class="text-xs uppercase tracking-[0.2em] text-lavender-accent/60 mb-3 font-semibold">Daily Verse</p>
<blockquote class="font-serif italic text-lg text-white leading-relaxed mb-3">
        "Be still, and know that I am God."
      </blockquote>
<cite class="text-xs text-lavender-accent/80 not-italic font-medium">— Psalm 46:10</cite>
<div class="mt-4 pt-4 border-t border-white/5 flex flex-col items-center">
<span class="text-[10px] uppercase tracking-widest text-white/40">Next Devotion in</span>
<span class="text-2xl font-light text-lavender-accent mt-1">02:14:05</span>
</div>
</section>
<!-- END: Daily Verse Section -->
<!-- BEGIN: Devotional Timeline -->
<section class="space-y-1" data-purpose="prayer-times-list">
<!-- Morning Prayer -->
<div class="flex items-center justify-between p-3 transition-all hover:bg-white/5 rounded-xl cursor-default">
<div class="flex items-center gap-4">
<svg class="text-yellow-200/70" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 2v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="M20 12h2"></path><path d="m19.07 4.93-1.41 1.41"></path><path d="M15.94 14.94a3 3 0 0 0-4.88-3.88"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
<span class="text-[15px] font-medium text-white/90">Morning Prayer</span>
</div>
<span class="text-sm font-mono text-white/60">06:30</span>
</div>
<!-- Noon Grace (Active/Next) -->
<div class="active-row flex items-center justify-between p-3 cursor-default">
<div class="flex items-center gap-4">
<svg class="text-lavender-accent" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
<span class="text-[15px] font-semibold text-lavender-accent">Noon Grace</span>
</div>
<span class="text-sm font-mono text-lavender-accent">12:15</span>
</div>
<!-- Evening Vesper -->
<div class="flex items-center justify-between p-3 transition-all hover:bg-white/5 rounded-xl cursor-default">
<div class="flex items-center gap-4">
<svg class="text-orange-300/60" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 10V2"></path><path d="m4.93 10.93 1.41 1.41"></path><path d="M2 18h2"></path><path d="M20 18h2"></path><path d="m19.07 10.93-1.41 1.41"></path><path d="M22 22H2"></path><path d="m16 22-2-4h-4l-2 4"></path></svg>
<span class="text-[15px] font-medium text-white/90">Evening Vesper</span>
</div>
<span class="text-sm font-mono text-white/60">18:45</span>
</div>
<!-- Night Prayer -->
<div class="flex items-center justify-between p-3 transition-all hover:bg-white/5 rounded-xl cursor-default">
<div class="flex items-center gap-4">
<svg class="text-blue-300/60" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
<span class="text-[15px] font-medium text-white/90">Night Prayer</span>
</div>
<span class="text-sm font-mono text-white/60">21:30</span>
</div>
<!-- Compline -->
<div class="flex items-center justify-between p-3 transition-all hover:bg-white/5 rounded-xl cursor-default">
<div class="flex items-center gap-4">
<svg class="text-indigo-400/60" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
<span class="text-[15px] font-medium text-white/90">Compline</span>
</div>
<span class="text-sm font-mono text-white/60">23:00</span>
</div>
</section>
<!-- END: Devotional Timeline -->
<!-- BEGIN: Footer Actions -->
<footer class="mt-6 pt-4 border-t border-white/5 flex justify-center gap-6" data-purpose="widget-footer">
<button class="text-[11px] uppercase tracking-widest text-white/30 hover:text-lavender-accent transition-colors font-semibold">Reflection</button>
<button class="text-[11px] uppercase tracking-widest text-white/30 hover:text-lavender-accent transition-colors font-semibold">Settings</button>
</footer>
<!-- END: Footer Actions -->
</main>
<!-- END: Desktop Widget Container -->
<script data-purpose="time-update">
    /* Small logic to update the countdown if this was a live widget */
    // In a real application, you would calculate the difference between 
    // now and the next prayer time (Noon Grace @ 12:15)
  </script>
</body></html>
